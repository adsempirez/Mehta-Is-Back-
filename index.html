<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEHTA IS BACK</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#050b12;
  color:white;
}

/* CONTAINER */
.container{
  text-align:center;
  padding:20px;
}

/* LOGO */
.logo{
  width:100px;
  height:100px;
  margin:auto;
  border-radius:25px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.05);
  animation:float 3s infinite;
}

.logo svg{
  width:60px;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{filter:drop-shadow(0 0 5px #00f5d4);}
  to{filter:drop-shadow(0 0 20px #00f5d4);}
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* TITLE */
h1{
  background:linear-gradient(90deg,#00f5d4,#00bbf9);
  -webkit-background-clip:text;
  color:transparent;
}

/* COUNTER */
.counter{
  margin:12px 0;
  font-size:16px;
  font-weight:600;
  color:#00f5d4;
  position:relative;
  display:inline-block;
}

.counter::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-5px;
  width:0%;
  height:2px;
  background:#00f5d4;
  animation:lineMove 2s infinite;
}

@keyframes lineMove{
  0%{width:0%;}
  50%{width:100%;}
  100%{width:0%;}
}

/* BUTTON */
.btn{
  display:block;
  margin:20px auto;
  width:80%;
  padding:15px;
  border-radius:30px;
  background:linear-gradient(90deg,#00f5d4,#00bbf9);
  color:#000;
  font-weight:bold;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  padding:15px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  background:rgba(0,255,200,0.1);
}

/* CHART */
.chart{
  margin-top:20px;
}

/* PROFIT POPUP */
#profitPopup{
  position:fixed;
  bottom:20px;
  left:20px;
  background:rgba(0,255,200,0.1);
  border:1px solid #00f5d4;
  padding:12px 16px;
  border-radius:12px;
  font-size:13px;
  color:#00f5d4;
  opacity:0;
  transform:translateY(20px);
  transition:0.5s;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <div class="logo">
    <svg viewBox="0 0 100 100">
      <defs>
        <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#00f5d4"/>
          <stop offset="100%" stop-color="#00bbf9"/>
        </linearGradient>
      </defs>
      <text x="50%" y="55%" text-anchor="middle" fill="url(#g)" font-size="50" font-weight="bold" dy=".3em">M</text>
    </svg>
  </div>

  <h1>MEHTA IS BACK</h1>

  <!-- COUNTER -->
  <div class="counter" id="counter">
    👥 50,000+ Traders Joined
  </div>

  <!-- TELEGRAM -->
  <a href="https://t.me/+H0ZVwXJ5RIFlYzk9" target="_blank" class="btn">
    🚀 JOIN TELEGRAM
  </a>

  <!-- CARDS -->
  <div class="grid">
    <div class="card">LIVE MARKET</div>
    <div class="card">F&O SETUPS</div>
    <div class="card">DAILY WATCHLIST</div>
    <div class="card">SMART TRADING</div>
  </div>

  <!-- CHART -->
  <div class="chart">
    <iframe 
      src="https://s.tradingview.com/widgetembed/?symbol=NSE:NIFTY&interval=5&theme=dark"
      width="100%" height="300" frameborder="0">
    </iframe>
  </div>

</div>

<!-- POPUP -->
<div id="profitPopup"></div>

<script>
// COUNTER ANIMATION
let target = 50000;
let count = 0;

function animateCounter(){
  if(count < target){
    count += Math.ceil((target - count) / 20);
    document.getElementById("counter").innerText =
      `👥 ${count.toLocaleString()}+ Traders Joined`;
    requestAnimationFrame(animateCounter);
  }
}
animateCounter();

// DEMO PROFIT POPUP
const names=["Rahul","Amit","Vikas","Neha","Arjun"];
function showProfit(){
  const popup=document.getElementById("profitPopup");
  const name=names[Math.floor(Math.random()*names.length)];
  const amt=Math.floor(Math.random()*4000)+500;

  popup.innerText=`${name} booked ₹${amt} (demo) 📊`;

  popup.style.opacity="1";
  popup.style.transform="translateY(0)";

  setTimeout(()=>{
    popup.style.opacity="0";
    popup.style.transform="translateY(20px)";
  },3000);
}
setInterval(showProfit,4000);
</script>

</body>
</html>
